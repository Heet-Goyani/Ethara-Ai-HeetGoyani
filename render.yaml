databases:
  - name: inventory-db
    plan: free

services:
  # FastAPI Backend Service
  - type: web
    name: inventory-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: PYTHON_VERSION
        value: 3.11.8
    plan: free
    rootDir: backend

  # React Frontend (served as a static site)
  - type: web
    name: inventory-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      # Redirect all routing requests back to index.html for client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
    rootDir: frontend
