databases:
  - name: inventory-db
    databaseName: inventory_db
    user: postgres
    plan: free

services:
  # FastAPI Backend Service
  - type: web
    name: inventory-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["*"]'
    plan: free
    rootDir: backend

  # React Frontend (served as a static site)
  - type: web
    name: inventory-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: inventory-backend
          property: url
    plan: free
    rootDir: frontend
